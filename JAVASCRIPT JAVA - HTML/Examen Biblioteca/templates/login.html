<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <style>
 
 body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 20px;
        background-color: #f4f7fc;
        padding: 50px;
    }

    h1 {
        font-size: 36px;
        color: #333;
    }

    h2 {
        color: #555;
    }

    input {
        margin: 10px;
        padding: 10px 20px;
        border-radius: 5px;
        border: 1px solid #ddd;
        width: 100%;
        max-width: 300px;
    }

    button {
        margin: 10px;
        padding: 12px 25px;
        font-size: 18px;
        cursor: pointer;
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 5px;
        transition: background-color 0.3s ease;
    }

    button:hover {
        background-color: #218838;
    }

    #status {
        color: #d9534f;
        margin-top: 10px;
    }
  /* ... Estilos previos ... */
  #registrarse-btn {
        display: none;
        margin: 20px auto;
        padding: 12px 25px;
        font-size: 18px;
        cursor: pointer;
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 5px;
        transition: background-color 0.3s ease;
        width: 200px; /* Ajuste de tamaño para el botón */
        text-align: center;
    }
    #registrarse-btn:hover {
        background-color: #218838;
    }

    </style>
</head>
<body>

    <h1>Bienvenido a la Biblioteca Digital</h1>
    <h2>Inicio de Sesión</h2>
    <input type="text" id="login-usuario" placeholder="Usuario">
    <input type="password" id="login-password" placeholder="Contraseña">
    <button onclick="iniciarSesion()">Iniciar Sesión</button>


    <p id="status"></p>
    <div style="text-align: center;">
        <button id="registrarse-btn" style="display: none;" onclick="window.location.href='/registro'">
            Registrarse
        </button>
    </div>
    
    <script>
        async function iniciarSesion() {
            const username = document.getElementById('login-usuario').value;
            const password = document.getElementById('login-password').value;
    
            const respuesta = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
    
            const data = await respuesta.json();
            document.getElementById('status').innerText = data.mensaje || data.error;
    
            if (data.mensaje) {
                window.location.href = "/biblioteca";  // Redirigir si inicia sesión con éxito
            } else if (data.mostrar_boton) {
                document.getElementById('registrarse-btn').style.display = "block"; // Mostrar botón de registro
            }
        }
    </script>

</body>
</html>
