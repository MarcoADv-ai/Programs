<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ravenmoor MVP Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .mvp-grid {
            display: grid;
            gap: 15px;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        }

        .mvp-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            animation: slideIn 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .mvp-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .mvp-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        .mvp-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .mvp-name {
            font-size: 1.3em;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .mvp-time {
            background: #f3f4f6;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            color: #6b7280;
            white-space: nowrap;
        }

        .mvp-details {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .detail-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-label {
            font-weight: 600;
            color: #6b7280;
            min-width: 80px;
        }

        .detail-value {
            color: #1f2937;
            flex: 1;
        }

        .character-name {
            color: #059669;
            font-weight: 600;
        }

        .map-name {
            background: #dbeafe;
            padding: 3px 10px;
            border-radius: 6px;
            color: #1e40af;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .experience {
            color: #dc2626;
            font-weight: 700;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            color: #6b7280;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: #9ca3af;
        }

        .stats {
            display: flex;
            gap: 15px;
            align-items: center;
            color: #6b7280;
            font-size: 0.9em;
        }

        .new-badge {
            background: #ef4444;
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 700;
            animation: badgePulse 2s infinite;
        }

        @keyframes badgePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @media (max-width: 768px) {
            .mvp-grid {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }

            .controls {
                flex-direction: column;
                gap: 15px;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Ravenmoor MVP Tracker</h1>
            <p>Detecta nuevos MVPs automáticamente cada 5 segundos - Historial compartido para todos</p>
        </header>

        <div class="controls">
            <div class="status">
                <div class="status-indicator"></div>
                <span>Activo - Última actualización: <strong id="lastUpdate">--:--:--</strong></span>
            </div>
            <div class="stats">
                <span>📊 MVPs detectados: <strong id="mvpCount">0</strong></span>
                <button class="button" onclick="resetTracking()">🔄 Reiniciar</button>
            </div>
        </div>

        <div id="mvpContainer">
            <div class="empty-state">
                <div class="empty-state-icon">⏳</div>
                <h3>Esperando nuevos MVPs...</h3>
                <p>Los nuevos MVPs derrotados aparecerán aquí automáticamente</p>
            </div>
        </div>
    </div>

    <script>
        let detectedMVPs = [];
        let updateInterval;

        // Cargar historial completo desde el servidor
        async function loadHistoryFromServer() {
            try {
                const response = await fetch('proxy.php?action=history');
                const data = await response.json();
                
                if (data.history && data.history.length > 0) {
                    // Invertir para mostrar los más recientes primero
                    detectedMVPs = data.history.reverse();
                    console.log(`📂 Cargados ${detectedMVPs.length} MVPs del servidor`);
                    renderMVPs();
                    updateMVPCount();
                }
            } catch (error) {
                console.error('Error cargando historial del servidor:', error);
            }
        }

        async function fetchNewMVPs() {
            try {
                const response = await fetch('proxy.php?action=mvps');
                const data = await response.json();
                
                // Agregar nuevos MVPs al principio de la lista
                if (data.new_mvps && data.new_mvps.length > 0) {
                    detectedMVPs = [...data.new_mvps, ...detectedMVPs];
                    renderMVPs();
                    console.log(`✅ ${data.new_mvps.length} nuevo(s) MVP(s) detectado(s). Total: ${detectedMVPs.length}`);
                }

                // Actualizar última actualización
                const now = new Date();
                document.getElementById('lastUpdate').textContent = now.toLocaleTimeString('es-ES');
                
                // Actualizar contador
                updateMVPCount();
            } catch (error) {
                console.error('Error fetching MVPs:', error);
            }
        }

        function renderMVPs() {
            const container = document.getElementById('mvpContainer');
            
            if (detectedMVPs.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⏳</div>
                        <h3>Esperando nuevos MVPs...</h3>
                        <p>Los nuevos MVPs derrotados aparecerán aquí automáticamente</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="mvp-grid">
                    ${detectedMVPs.map((mvp, index) => `
                        <div class="mvp-card">
                            <div class="mvp-header">
                                <div>
                                    <div class="mvp-name">${mvp.mvp}</div>
                                    ${index < 3 ? '<span class="new-badge">NUEVO</span>' : ''}
                                </div>
                                <div class="mvp-time">⏰ ${mvp.detected_at}</div>
                            </div>
                            <div class="mvp-details">
                                <div class="detail-row">
                                    <span class="detail-label">👤 Personaje:</span>
                                    <span class="detail-value character-name">${mvp.character}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">💰 Experiencia:</span>
                                    <span class="detail-value experience">${mvp.experience}</span>
                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">🗺️ Mapa:</span>
                                    <span class="detail-value"><span class="map-name">${mvp.map}</span></span>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function updateMVPCount() {
            document.getElementById('mvpCount').textContent = detectedMVPs.length;
        }

        async function resetTracking() {
            if (confirm('⚠️ ¿Estás seguro de que quieres reiniciar el tracking?\n\nEsto borrará TODOS los MVPs detectados del servidor.\nTODOS los usuarios verán la lista vacía.')) {
                try {
                    await fetch('proxy.php?action=reset');
                    detectedMVPs = [];
                    renderMVPs();
                    updateMVPCount();
                    alert('✅ Tracking reiniciado correctamente en el servidor');
                } catch (error) {
                    console.error('Error resetting tracking:', error);
                    alert('❌ Error al reiniciar el tracking');
                }
            }
        }

        // Iniciar actualización automática cada 5 segundos
        function startAutoUpdate() {
            fetchNewMVPs(); // Primera carga
            updateInterval = setInterval(fetchNewMVPs, 5000);
        }

        // Detener actualización automática
        function stopAutoUpdate() {
            if (updateInterval) {
                clearInterval(updateInterval);
            }
        }

        // Iniciar cuando la página carga
        window.addEventListener('load', async () => {
            await loadHistoryFromServer(); // Cargar historial del servidor primero
            startAutoUpdate();
            console.log('🚀 MVP Tracker iniciado - Datos compartidos desde el servidor');
        });

        // Limpiar al cerrar la página
        window.addEventListener('beforeunload', () => {
            stopAutoUpdate();
        });
    </script>
</body>
</html>
